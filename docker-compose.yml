services:
  api:
    build: .
    ports:
      - "4567:4567"
    environment:
      DATABASE_URL: sqlite:///app/db/tickets.db
      RACK_ENV: development
    volumes:
      - ticket-data:/app/db
    healthcheck:
      test: ["CMD", "ruby", "-rnet/http", "-e", "exit Net::HTTP.get_response(URI('http://localhost:4567/health')).is_a?(Net::HTTPSuccess) ? 0 : 1"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  ticket-data:

